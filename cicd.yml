name: CI/CD — Weather Lakehouse Platform

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  TF_DIR: terraform/environments/prod
  PYTHON_VERSION: "3.11"

# Concurrency: Cancel in-progress runs for the same PR/branch (except on main)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ──────────────────────────────────────────────────────────────
  # PR Validation Jobs
  # ──────────────────────────────────────────────────────────────

  terraform-plan:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials (OIDC) - Plan Role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-terraform-plan

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0   # Updated to latest stable
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Init
        run: terraform init -input=false -backend=false
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -detailed-exitcode
        working-directory: ${{ env.TF_DIR }}
        continue-on-error: true

      - name: Post Terraform Plan to PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `${{ steps.plan.outputs.stdout || steps.plan.outputs.stderr }}`;
            const hasChanges = ${{ steps.plan.outputs.exitcode == '2' }};
            const planSummary = hasChanges 
              ? "✅ **Terraform Plan** — Infrastructure changes detected" 
              : "✅ **Terraform Plan** — No changes detected";

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${planSummary}\n\n\`\`\`terraform\n${output}\n\`\`\``
            });

  # ──────────────────────────────────────────────────────────────
  # Security & Code Quality
  # ──────────────────────────────────────────────────────────────

  security-scan:
    name: Security Scan (Checkov + Bandit)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Security Tools
        run: pip install checkov bandit

      - name: Checkov IaC Scan
        run: |
          checkov -d terraform/ \
            --framework terraform \
            --hard-fail-on HIGH,MEDIUM \
            --soft-fail-on LOW \
            --compact \
            --output cli

      - name: Bandit Python Security Scan
        run: |
          bandit -r glue/ lambda/ airflow/ \
            --level WARNING \
            --format json \
            -o bandit-report.json || true

      - name: Upload Bandit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  python-lint:
    name: Python Lint & Type Checking
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Linting Tools
        run: pip install ruff mypy types-boto3 boto3-stubs[essential]

      - name: Ruff Lint
        run: ruff check glue/ lambda/ airflow/ --output-format=github

      - name: Ruff Format Check
        run: ruff format --check glue/ lambda/ airflow/

      - name: MyPy Type Check
        run: mypy glue/ lambda/ airflow/ --no-error-summary || true

  # ──────────────────────────────────────────────────────────────
  # Production Deployment (Protected)
  # ──────────────────────────────────────────────────────────────

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [terraform-plan, security-scan, python-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials (OIDC) - Deploy Role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-terraform-deploy

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false

      - name: Terraform Init & Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Sync Glue Jobs to S3
        run: |
          aws s3 sync glue/jobs/ \
            s3://${{ secrets.SCRIPTS_BUCKET }}/glue/jobs/ \
            --exclude "*.pyc" \
            --delete \
            --no-progress

      - name: Package and Deploy Ingestion Lambda
        run: |
          cd lambda/ingestion
          
          # Clean previous package if exists
          rm -rf package/ function.zip || true
          
          # Install dependencies
          pip install --target package/ aiohttp awswrangler
          
          # Package dependencies + code
          cd package
          zip -r ../function.zip .
          cd ..
          zip -g function.zip handler.py
          
          # Deploy
          aws lambda update-function-code \
            --function-name weather-ingestion \
            --zip-file fileb://function.zip \
            --no-cli-pager

          echo "Lambda function weather-ingestion updated successfully."

      # Optional: Add more deployment steps here (e.g. other Lambdas, Glue triggers, etc.)
